title: JFrog Artifactory
author: harness
tags:
  - publish
  - artifactory
logo: artifactory.svg
repo: https://github.com/harness/drone-artifactory
image: https://hub.docker.com/r/plugins/artifactory
license: Blue Oak Model License 1.0.0
readme: https://github.com/harness/drone-artifactory/blob/main/README.md
description: |
  A plugin to upload files to Jfrog artifactory.
example: |
  kind: pipeline
  name: default

  steps:
  - name: docker  
    image: plugins/artifactory
    settings:
      username: kevinbacon
      password: pa55word
      url: company.com/artifactory
      source: release.tar.gz
      target: app/release.tar.gz
      insecure: true
      pem_file_contents:
        from_secret: pem_file_contents
properties:
  username:
    type: string
    defaultValue: ""
    description: username for authentication with artifactory
    secret: false
    required: false
  password:
    type: string
    defaultValue: ""
    description: password for authentication with artifactory
    secret: true
    required: false
  apikey:
    type: string
    defaultValue: ""
    description: key for authentication with artifactory
    secret: true
    required: false
  url:
    type: string
    defaultValue: ""
    description: location of the artifactory server
    secret: false
    required: true
  source:
    type: string
    defaultValue: ""
    description: file(s) to upload
    secret: false
    required: true
  target:
    type: string
    defaultValue: ""
    description: destination of source files in artifactory
    secret: false
    required: true
  retries:
    type: number
    defaultValue: 3
    description: number of upload retries
    secret: false
    required: false
  flat:
    type: boolean
    defaultValue: false
    description: if true, artifacts are downloaded to the exact target path specified and their hierarchy in the source repository is ignored. if false, artifacts are downloaded to the target path in the file system while maintaining their hierarchy in the source repository
    secret: false
    required: false
  insecure:
    type: boolean
    defaultValue: false
    description: if true, the connection to the source repository is not validated by checking the server certificate. if false, the connection to the source repository is validated by checking the server certificate
    secret: false
    required: false
  pem_file_contents:
    type: string
    defaultValue: ""
    description: pem file contents for authentication with artifactory, cannot be used in conjunction with insecure
    secret: true
    required: false
  pem_file_path:
    type: string
    defaultValue: ""
    description: pem file path for authentication with artifactory, defaults to either "C:/users/ContainerAdministrator/.jfrog/security/certs/cert.pem" or "/root/.jfrog/security/certs/cert.pem"
    secret: false
    required: false
  access_token:
    type: string
    defaultValue: ""
    description: "Access token for authentication with Artifactory"
    secret: true
    required: false
  command:
    type: string
    defaultValue: ""
    description: "Command to execute (cleanup, download, publish, promote, scan)"
    secret: false
    required: true
  build_name:
    type: string
    defaultValue: ""
    description: "Name of the build in Artifactory"
    secret: false
    required: true
  build_number:
    type: string
    defaultValue: ""
    description: "Build number in Artifactory"
    secret: false
    required: true
  module:
    type: string
    defaultValue: ""
    description: "Module name used in Artifactory"
    secret: false
    required: false
  project:
    type: string
    defaultValue: ""
    description: "Project identifier in Artifactory"
    secret: false
    required: false
  spec_path:
    type: string
    defaultValue: ""
    description: "Path to the JSON specification file for downloads"
    secret: false
    required: false
  spec:
    type: string
    defaultValue: ""
    description: "Inline JSON specification for download"
    secret: false
    required: false
  build_tool:
    type: string
    defaultValue: ""
    description: "Build tool used (mvn, gradle)"
    secret: false
    required: false
  repo_resolve:
    type: string
    defaultValue: ""
    description: "Repository used to resolve dependencies"
    secret: false
    required: false
  repo_deploy:
    type: string
    defaultValue: ""
    description: "Repository used to deploy artifacts"
    secret: false
    required: false
  tasks:
    type: string
    defaultValue: ""
    description: "Tasks executed in the build process (for Gradle)"
    secret: false
    required: false
  threads:
    type: string
    defaultValue: "3"
    description: "Number of threads used in the build process"
    secret: false
    required: false
  project_key:
    type: string
    defaultValue: ""
    description: "Project key in Artifactory"
    secret: false
    required: false
  deployer_id:
    type: string
    defaultValue: ""
    description: "Deployer ID for publishing artifacts"
    secret: false
    required: false
  pom:
    type: string
    defaultValue: "pom.xml"
    description: "Path to Maven POM file"
    secret: false
    required: false
  goals:
    type: string
    defaultValue: ""
    description: "Goals to execute in the Maven build process"
    secret: false
    required: false
  resolver_id:
    type: string
    defaultValue: ""
    description: "Resolver ID used for dependency resolution"
    secret: false
    required: false
  resolve_release_repo:
    type: string
    defaultValue: ""
    description: "Maven repository for resolving release dependencies"
    secret: false
    required: false
  resolve_snapshot_repo:
    type: string
    defaultValue: ""
    description: "Maven repository for resolving snapshot dependencies"
    secret: false
    required: false
  deploy_release_repo:
    type: string
    defaultValue: ""
    description: "Maven repository for deploying release artifacts"
    secret: false
    required: false
  deploy_snapshot_repo:
    type: string
    defaultValue: ""
    description: "Maven repository for deploying snapshot artifacts"
    secret: false
    required: false
  copy:
    type: boolean
    defaultValue: false
    description: "Whether to copy the build artifacts during promotion"
    secret: false
    required: false
