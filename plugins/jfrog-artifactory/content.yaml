title: JFrog Artifactory
author: harness
tags:
  - publish
  - artifactory
logo: artifactory.svg
repo: https://github.com/harness/drone-artifactory
image: https://hub.docker.com/r/plugins/artifactory
license: Blue Oak Model License 1.0.0
readme: https://github.com/harness/drone-artifactory/blob/main/README.md
description: |
  A plugin to upload files to Jfrog artifactory.
example: |
  kind: pipeline
  name: default

  steps:
  - name: docker  
    image: plugins/artifactory
    settings:
      username: kevinbacon
      password: pa55word
      url: company.com/artifactory
      source: release.tar.gz
      target: app/release.tar.gz
      insecure: true
      pem_file_contents:
        from_secret: pem_file_contents
    step:
      type: Plugin
      name: PluginMvnRun
      identifier: PluginMvnRun
      spec:
        connectorRef: senthil_dockerhub_connector
        image: plugins/artifactory:latest
        settings:
          log_level: 5
          build_tool: mvn
          username: <+secrets.getValue("artifactory_regression_user")>
          password: <+secrets.getValue("artifactory_regression_user_password")>
          pom: pom.xml
          goals: clean install
          build_name: xray_test_12
          build_number: xray_test_12_3.1
          url: <+secrets.getValue("artifactory_regression_url")>
          resolver_id: tmpSrvConfig
          resolve_release_repo: mvn_repo_resolve_releases_01
          resolve_snapshot_repo: mvn_repo_resolve_snapshots_01
          deployer_id: tmpSrvConfig
properties:
  username:
    type: string
    defaultValue: ""
    description: username for authentication with artifactory
    secret: false
    required: false
  password:
    type: string
    defaultValue: ""
    description: password for authentication with artifactory
    secret: true
    required: false
  apikey:
    type: string
    defaultValue: ""
    description: key for authentication with artifactory
    secret: true
    required: false
  url:
    type: string
    defaultValue: ""
    description: location of the artifactory server
    secret: false
    required: true
  source:
    type: string
    defaultValue: ""
    description: file(s) to upload
    secret: false
    required: true
  target:
    type: string
    defaultValue: ""
    description: destination of source files in artifactory
    secret: false
    required: true
  retries:
    type: number
    defaultValue: 3
    description: number of upload retries
    secret: false
    required: false
  flat:
    type: boolean
    defaultValue: false
    description: if true, artifacts are downloaded to the exact target path specified and their hierarchy in the source repository is ignored. if false, artifacts are downloaded to the target path in the file system while maintaining their hierarchy in the source repository
    secret: false
    required: false
  insecure:
    type: boolean
    defaultValue: false
    description: if true, the connection to the source repository is not validated by checking the server certificate. if false, the connection to the source repository is validated by checking the server certificate
    secret: false
    required: false
  pem_file_contents:
    type: string
    defaultValue: ""
    description: pem file contents for authentication with artifactory, cannot be used in conjunction with insecure
    secret: true
    required: false
  pem_file_path:
    type: string
    defaultValue: ""
    description: pem file path for authentication with artifactory, defaults to either "C:/users/ContainerAdministrator/.jfrog/security/certs/cert.pem" or "/root/.jfrog/security/certs/cert.pem"
    secret: false
    required: false
  log_level:
    type: number
    defaultValue: 5
    description: log_level of the step
    secret: false
    required: false
  build_tool:
    type: string
    defaultValue: ""
    description: build_tool of the step
    secret: false
    required: false
  username2:
    type: string
    defaultValue: ""
    description: username for authentication with artifactory
    secret: false
    required: false
  password2:
    type: string
    defaultValue: ""
    description: password for authentication with artifactory
    secret: false
    required: false
  pom:
    type: string
    defaultValue: ""
    description: pom file
    secret: false
    required: false
  goals:
    type: string
    defaultValue: ""
    description: goals
    secret: false
    required: false
  build_name:
    type: string
    defaultValue: ""
    description: build_name of the step
    secret: false
    required: false
  build_number:
    type: string
    defaultValue: ""
    description: build_number of the step
    secret: false
    required: false
  url2:
    type: string
    defaultValue: ""
    description: url
    secret: false
    required: false
  resolver_id:
    type: string
    defaultValue: ""
    description: Resolver Id
    secret: false
    required: false
  resolve_release_repo:
    type: string
    defaultValue: ""
    description: Resolve Release Step
    secret: false
    required: false
  resolve_snapshot_repo:
    type: string
    defaultValue: ""
    description: Resolve SnapShot Repo
    secret: false
    required: false
  deployer_id:
    type: string
    defaultValue: ""
    description: Deployer Id
    secret: false
    required: false
